    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    /* CENTRATURA DELLA SCHERMATA */
    .schermata {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      flex-direction: column;
    }

    .container {
      background-color: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 320px;
    }

    h1 {
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      background-color: #4CAF50;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

      button:hover {
        background-color: #45a049;
      }

    /* GRID */
    #grigliaSchermata {
      display: none;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #grigliaSchermata {
      display: flex; /* contenitore flessibile */
      flex-direction: column; /* mette i figli in verticale */
      align-items: center; /* centra orizzontalmente */
      justify-content: flex-start; /* inizia dall’alto */
      gap: 10px; /* spazio tra titolo e griglia */
      width: 100%;
      height: 100vh; /* opzionale, occupa tutta l’altezza */
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 110px);
      grid-template-rows: repeat(5, 110px);
      gap: 8px;
    }

    .tile {
      background: white;
      border: 2px solid #ccc;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      padding: 5px;
      font-size: 14px;
    }

      .tile.active {
        background: #4CAF50;
        color: white;
      }
  </style>

    // HASH STRING → SEED
    function stringToSeed(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }
      return hash >>> 0;
    }

    // PRNG deterministico
    function mulberry32(seed) {
      return function () {
        seed |= 0;
        seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    // ESTRAE M ELEMENTI PSEUDOCASUALI
    function pickSeeded(list, m, password) {
      const seed = stringToSeed(password);
      const rand = mulberry32(seed);
      const arr = [...list];
      const result = [];
      for (let i = 0; i < m && arr.length > 0; i++) {
        const index = Math.floor(rand() * arr.length);
        result.push(arr[index]);
        arr.splice(index, 1);
      }
      return result;
    }

    // CREA GRIGLIA
    function generaGriglia() {
      const password = document.getElementById("parola").value;
      if (password.length == 0) {

        return;
      }
      if (selezionaruolo.value == "NESSUNASELEZIONE") {
        alert("Inserisci un ruolo");

      } else {

          ruolo = "Capitano";

        }
        else {

      function controllaVittoria() {
        const tiles = document.querySelectorAll(".tile");
        let bluSelezionate = true;
        let rosseSelezionate = true;
        let neraCliccata = false;

        tiles.forEach(t => {
          const colore = t.dataset.colore;
          const selez = t.dataset.selezionato === "true";

          if (colore === "blu" && !selez) bluSelezionate = false;
          if (colore === "rosso" && !selez) rosseSelezionate = false;
          if (colore === "nero" && selez) neraCliccata = true;
        });

        if (neraCliccata) {
          alert("Hai cliccato la casella nera, la tua squadra ha perso!");
        } else if (bluSelezionate) {
          alert("Hanno vinto i blu!");
        } else if (rosseSelezionate) {
          alert("Hanno vinto i rossi!");
        }

      document.getElementById("pannelloImpostazioni").style.display = "none";

      // MOSTRA LA GRIGLIA
      document.getElementById("grigliaSchermata").style.display = "flex";

      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      const estratti = pickSeeded(parole, 25, password);

      const tessereColor = generaTessere(password); // ottieni i colori

      estratti.forEach((parola, idx) => {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.textContent = parola;

        tile.dataset.colore = tessereColor[idx + 1];
        tile.dataset.mostra = "false";
        tile.dataset.selezionato = "false"; // nuova proprietà per controllare selezione

            case 'blu': tile.style.background = "#2196F3"; tile.style.color = "white"; break;
            case 'rosso': tile.style.background = "#F44336"; tile.style.color = "white"; break;
            case 'nero': tile.style.background = "#000"; tile.style.color = "white"; break;
            case 'giallo': tile.style.background = "#FFEB3B"; tile.style.color = "black"; break;
          }

          tile.onclick = function () {
            if (tile.dataset.selezionato === "false") {
              // Aggiunge la X nera gigante
              const x = document.createElement("div");
              x.className = "xmark";
              x.textContent = "✖";
              x.style.position = "absolute";
              x.style.top = "0";
              x.style.left = "0";
              x.style.width = "100%";
              x.style.height = "100%";
              x.style.display = "flex";
              x.style.alignItems = "center";
              x.style.justifyContent = "center";
              x.style.fontSize = "60px";
              x.style.color = "black";
              tile.style.position = "relative"; // importante
              tile.appendChild(x);

              tile.dataset.selezionato = "true";
              controllaVittoria();
            }
          };

        } else {

          tile.style.background = "white";
          tile.style.color = "black";

          tile.onclick = function () {
            if (tile.dataset.mostra === "false") {
              switch (tile.dataset.colore) {
                case 'blu': tile.style.background = "#2196F3"; tile.style.color = "white"; break;
                case 'rosso': tile.style.background = "#F44336"; tile.style.color = "white"; break;
                case 'nero': tile.style.background = "#000"; tile.style.color = "white"; break;
                case 'giallo': tile.style.background = "#FFEB3B"; tile.style.color = "black"; break;
              }
              tile.dataset.mostra = "true";
              tile.dataset.selezionato = "true";

              controllaVittoria();
            }
          };
        }

        grid.appendChild(tile);
      });
      // Funzione per controllare vittoria o sconfitta

    function generaTessere(password) {
      const seed = stringToSeed(password);
      const rand = mulberry32(seed);

      // 1..25
      let numeri = Array.from({ length: 25 }, (_, i) => i + 1);

      // mescola pseudocasuale
      for (let i = numeri.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [numeri[i], numeri[j]] = [numeri[j], numeri[i]];
      }

      // Dividi i numeri
      const gruppo1 = numeri.slice(0, 9);  // 9 tessere
      const gruppo2 = numeri.slice(9, 17); // 8 tessere
      const gruppo3 = numeri.slice(17, 18); // 1 tessera nera
      const gruppo4 = numeri.slice(18, 25); // 7 tessere gialle

      // Decide casualmente quale colore inizia
      const primoColore = rand() < 0.5 ? 'blu' : 'rosso';
      const secondoColore = primoColore === 'blu' ? 'rosso' : 'blu';
      if (primoColore == 'rosso') {
        titologriglia.textContent = "Inizia squadra blu";
        titologriglia.style.color="blue"
      } else {
        titologriglia.textContent = "Inizia squadra rossa"
        titologriglia.style.color = "red"
      }
      // Mescola interno gruppo1 per assegnare colore
      const gruppo1Color = [];
      for (let i = 0; i < 9; i++) {
        gruppo1Color.push(i < 4 ? primoColore : secondoColore); // 4-5 tessere per bilanciare 50/50
      }
      // shuffle interno pseudocasuale
      for (let i = gruppo1Color.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [gruppo1Color[i], gruppo1Color[j]] = [gruppo1Color[j], gruppo1Color[i]];
      }

      // Gruppo2 → opposto
      const gruppo2Color = [];
      for (let i = 0; i < 8; i++) {
        gruppo2Color.push(i < 4 ? secondoColore : primoColore); // 4-4
      }
      for (let i = gruppo2Color.length - 1; i > 0; i--) {
        const j = Math.floor(rand() * (i + 1));
        [gruppo2Color[i], gruppo2Color[j]] = [gruppo2Color[j], gruppo2Color[i]];
      }

      // Gruppo3 → nero
      const gruppo3Color = ['nero'];

      // Gruppo4 → giallo
      const gruppo4Color = Array(7).fill('giallo');

      // Assegna colori agli indici
      const tessere = {};
      for (let i = 0; i < 9; i++) { tessere[gruppo1[i]] = gruppo1Color[i]; }
      for (let i = 0; i < 8; i++) { tessere[gruppo2[i]] = gruppo2Color[i]; }
      tessere[gruppo3[0]] = 'nero';
      for (let i = 0; i < 7; i++) { tessere[gruppo4[i]] = 'giallo'; }

      return tessere; // oggetto {numero: colore}
    }
